name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push version bump commit
      id-token: write   # needed for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token that can push to the default branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      # Strip leading 'v' from the release tag (v1.2.3 → 1.2.3)
      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Bump package.json, create a commit, push back to the default branch
      - name: Bump version in package.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "${{ steps.version.outputs.value }}" --no-git-tag-version --allow-same-version
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.value }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
